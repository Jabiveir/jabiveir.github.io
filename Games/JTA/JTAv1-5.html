				BlockDetect(Player, Block, Ctx) {
					Block.BData.Temp = false;
					Block.BData.PortalTemp = false;
					//Full block collision
					if (
						Block.BData.XPos * 24 < Player.PData.XPos + 19 &&
						Player.PData.XPos < Block.BData.XPos * 24 + 23
					) {
						if (
							Block.BData.YPos * 24 < Player.PData.YPos + 19 &&
							Player.PData.YPos < Block.BData.YPos * 24 + 23
						) {
							if (Block.BData.Type === "Lava") {
								Player.Spawn(Ctx, Player.PData.Level);
							}
							if (Block.BData.Type === "Key") {
								Player.PData.Keys += 2;
								Block.BData.Type = "";
							}
							if (Block.BData.Type === "LockedPortal") {
								if (Player.PData.Keys > 0) {
									Player.PData.Keys -= 1;
									Block.BData.Type = "Portal";
								}
							}
							if (Block.BData.Type === "Portal") {
								if (Player.PData.TouchingPortal === false) {
									Player.PData.TouchingPortal = true;
									Player.PData.XPos = Block.BData.PortalX * 24 + 2;
									Player.PData.YPos = Block.BData.PortalY * 24 + 4;
								}
								Block.BData.PortalTemp = true;
							}
							if (Block.BData.Type === "Flag") {
								Player.Spawn(Ctx, Player.PData.Level);
								Player.PData.Level += 1;
							}
						}
					}
					//Top of block collision
					if (
						Block.BData.YPos * 24 < Player.PData.YPos + 20 &&
						Player.PData.YPos + 20 < Block.BData.YPos * 24 + 3
					) {
						if (
							Block.BData.XPos * 24 - 19 < Player.PData.XPos &&
							Player.PData.XPos < Block.BData.XPos * 24 + 23
						) {
							if (
								Block.BData.Type === "Block" ||
								Block.BData.Type === "Platform" ||
								Block.BData.Type === "Speed" ||
								(Block.BData.Type === "Red" && Player.PData.BlockState === "Red") ||
								(Block.BData.Type === "Blue" && Player.PData.BlockState === "Blue") ||
								(Block.BData.Type === "Purple" && Player.PData.Timer % 8 < 4)
							) {
								Player.PData.YVel = 0;
								Player.PData.YPos = Block.BData.YPos * 24 - 20;
								Block.BData.Temp = true;
								if (Block.BData.Type === "Speed") {
									if (Block.BData.Dir === "Up") Player.PData.YVel += 90;
									if (Block.BData.Dir === "Left") Player.PData.XVel -= 2;
									if (Block.BData.Dir === "Right") Player.PData.XVel += 2;
								}
							}
						}
					}
					//Smaller full block collision
					if (
						Block.BData.XPos * 24 < Player.PData.XPos + 18 &&
						Player.PData.XPos < Block.BData.XPos * 24 + 22
					) {
						if (
							Block.BData.YPos * 24 < Player.PData.YPos + 18 &&
							Player.PData.YPos < Block.BData.YPos * 24 + 22
						) {
							if (
								(Block.BData.Type === "Red" && Player.PData.BlockState === "Red") ||
								(Block.BData.Type === "Blue" && Player.PData.BlockState === "Blue") ||
								(Block.BData.Type === "Purple" && Player.PData.Timer % 8 < 4)
							) {
								Player.Spawn(Ctx, Player.PData.Level);
							}
						}
					}
					//Left of block collision
					if (
						Block.BData.XPos * 24 < Player.PData.XPos + 20 &&
						Player.PData.XPos + 20 < Block.BData.XPos * 24 + 24
					) {
						if (
							Block.BData.YPos * 24 - 19 < Player.PData.YPos &&
							Player.PData.YPos < Block.BData.YPos * 24 + 23
						) {
							if (
								Block.BData.Type === "Block" ||
								Block.BData.Type === "Speed" ||
								(Block.BData.Type === "Red" && Player.PData.BlockState === "Red") ||
								(Block.BData.Type === "Blue" && Player.PData.BlockState === "Blue") ||
								(Block.BData.Type === "Purple" && Player.PData.Timer % 8 < 4)
							) {
								Player.PData.XVel = 0;
								Player.PData.XPos = Block.BData.XPos * 24 - 20;
							}
						}
					}
					//Right of block collision
					if (
						Block.BData.XPos * 24 + 12 < Player.PData.XPos &&
						Player.PData.XPos < Block.BData.XPos * 24 + 24
					) {
						if (
							Block.BData.YPos * 24 - 19 < Player.PData.YPos &&
							Player.PData.YPos < Block.BData.YPos * 24 + 23
						) {
							if (
								Block.BData.Type === "Block" ||
								Block.BData.Type === "Speed" ||
								(Block.BData.Type === "Red" && Player.PData.BlockState === "Red") ||
								(Block.BData.Type === "Blue" && Player.PData.BlockState === "Blue") ||
								(Block.BData.Type === "Purple" && Player.PData.Timer % 8 < 4)
							) {
								Player.PData.XVel = 0;
								Player.PData.XPos = Block.BData.XPos * 24 + 24;
							}
						}
					}
					//Bottom of block collision
					if (
						Block.BData.YPos * 24 + 18 < Player.PData.YPos &&
						Player.PData.YPos < Block.BData.YPos * 24 + 24
					) {
						if (
							Block.BData.XPos * 24 - 19 < Player.PData.XPos &&
							Player.PData.XPos < Block.BData.XPos * 24 + 23
						) {
							if (
								Block.BData.Type === "Block" ||
								Block.BData.Type === "Speed" ||
								(Block.BData.Type === "Red" && Player.PData.BlockState === "Red") ||
								(Block.BData.Type === "Blue" && Player.PData.BlockState === "Blue") ||
								(Block.BData.Type === "Purple" && Player.PData.Timer % 8 < 4)
							) {
								Player.PData.YVel = -1;
								Player.PData.YPos = Block.BData.YPos * 24 + 24;
							}
						}
					}
				}
			};

			class levels {
				Collision(Ctx, Player, Level) {
					if (Player.PData.XPos < 0) {
						Player.PData.XPos = 0;
						Player.PData.XVel = 0;
					}
					if (Player.PData.XPos > 700) {
						Player.PData.XPos = 700;
						Player.PData.XVel = 0;
					}
					if (Player.PData.YPos < 0) {
						Player.PData.YPos = 0;
						Player.PData.YVel = -1;
					}
					if (Player.PData.YPos > 480 || isNaN(Player.PData.YPos))
						Player.Spawn(Ctx, Player.PData.Level);
					Player.PData.OnGround = false;
					Player.PData.PortalTemp2 = false;
					for (let i = 0; i < Levels[Level].length; i++) {
						Levels[Level][i].BlockDetect(Player, Levels[Level][i], Ctx);
						if (
							Levels[Level][i].BData.Type === "Block" &&
							Levels[Level][i].BData.Dir === "Down"
						) {
							Levels[Level][i].BData.YPos += 1 / 72;
							if (Levels[Level][i].BData.YPos >= 20) Levels[Level][i].BData.YPos = -1;
						}
						if (Levels[Level][i].BData.Temp) Player.PData.OnGround = true;
						if (Levels[Level][i].BData.PortalTemp) Player.PData.PortalTemp2 = true;
					}
					if (Player.PData.PortalTemp2 === false) {
						Player.PData.TouchingPortal = false;
					}
					if (Player.PData.Level === 18) {
						Ctx.fillStyle = "#000";
						Ctx.font = "60px sans-serif";
						Ctx.fillText("Game complete", 150, 100);
						Ctx.font = "50px sans-serif";
						Ctx.fillText("You did it! Yes!", 190, 160);
					}
				}
			
				DrawLevel(Ctx, Level, Player) {
					for (let i = 0; i < Levels[Level].length; i++)
						Levels[Level][i].DrawBlock(Ctx, Player);
					let d = new Date();
					d.setTime(d.getTime() + 365 * 24 * 60 * 60 * 1000);
					document.cookie =
						"JTALevel=" + Player.PData.Level + ";expires=" + d.toUTCString() + ";path=/";
				}
			
				ResetLevel(Ctx, Player) {
					for (let i = 0; i < Levels[Player.PData.Level].length; i++) {
						Levels[Player.PData.Level][i].BData.Type =
							Levels[Player.PData.Level][i].BData.Origin ||
							Levels[Player.PData.Level][i].BData.Type;
					}
				}
			};

			class Player {
				Spawn(Ctx, Level) {
					this.PData = {
						XPos: 24,
						YPos: 436,
						XVel: 0,
						YVel: 0,
						OnGround: true,
						MovingRight: false,
						MovingLeft: false,
						Jumping: false,
						ClickX: 0,
						ClickY: 0,
						Level: Level,
						TouchingPortal: false,
						PortalTemp2: false,
						BlockState: "Red",
						Timer: 0,
						Keys: 0
					};
					PLevels.ResetLevel(Ctx, this);
				}
			
				Update(Ctx) {
					PLevels.DrawLevel(Ctx, this.PData.Level, this);
					this.PData.XVel *= 0.9;
					for (let i = 0; i < 4; i++) {
						if (this.PData.MovingRight) {
							if (this.PData.XVel === 0) this.PData.XVel = 10;
							else this.PData.XVel += 80 / 16.7 / 4;
						}
						if (this.PData.MovingLeft) {
							if (this.PData.XVel === 0) this.PData.XVel = -10;
							else this.PData.XVel -= 80 / 16.7 / 4;
						}
						if (this.PData.Jumping) {
							if (this.PData.OnGround) this.PData.YVel += 3100 / 16.7 / 4;
							else this.PData.YVel += 16 / 16.7 / 4;
						}
						this.PData.XPos += this.PData.XVel / 16.7 / 4;
						this.PData.YPos -= this.PData.YVel / 16.7 / 4;
						this.PData.YVel -= 30 / 16.7 / 4;
						PLevels.Collision(Ctx, this, this.PData.Level);
					}
					this.PData.Timer += 1;
					if (this.PData.Timer >= 128) {
						if (this.PData.BlockState === "Red") this.PData.BlockState = "Blue";
						else this.PData.BlockState = "Red";
						this.PData.Timer = 0;
					}
					Ctx.fillStyle = "#0f0";

						Ctx.fillStyle = "#f00";
						Ctx.fillRect(this.PData.XPos + 4, this.PData.YPos + 8, 4, 4);
					}
				}
			};

			class Game {
				constructor(Ctx, Player) {
			    //This code was stolen from StackOverflow I think
				
					var limitLoop = function (fn, fps) {
						// Use var then = Date.now(); if you
						// don't care about targetting < IE9
						var then = new Date().getTime();
					
						// custom fps, otherwise fallback to 60
						fps = fps || 60;
						var interval = 1000 / fps;
					
						return (function loop(time) {
							requestAnimationFrame(loop);
						
							// again, Date.now() if it's available
							var now = new Date().getTime();
							var delta = now - then;
						
							if (delta > interval) {
								// Update time
								// now - (delta % interval) is an improvement over just
								// using then = now, which can end up lowering overall fps
								then = now - (delta % interval);
							
								// call the fn
								fn();
							}
						})(0);
					};
					function GameLoop() {
						Ctx.clearRect(0, 0, 720, 480);
						Player.Update(Ctx);
					}
					limitLoop(GameLoop, 60);
				}
			};
